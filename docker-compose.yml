
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testwork_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: sh -c "php artisan serve --host=0.0.0.0 --port=8000"

  node:
    image: node:22-alpine
    container_name: testwork_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  db:
    image: postgres:16-alpine
    container_name: testwork_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: testwork
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
