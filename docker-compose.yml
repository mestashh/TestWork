services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testwork_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
      - elasticsearch
    command: sh -c "php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - testwork

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: testwork_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - testwork

  node:
    image: node:22-alpine
    container_name: testwork_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - testwork

  db:
    image: postgres:16-alpine
    container_name: testwork_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: testwork
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - testwork

volumes:
  postgres_data:
  elasticsearch_data:

networks:
  testwork:
